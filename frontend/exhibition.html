<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exhibition - Bena Kouture</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400;1,600&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">

  <style>
    :root { --wine:#722F37; }
    body { font-family:'Raleway',sans-serif; background:#0a0606; color:white; margin:0; }

    .nav-bar {
      position:fixed; top:0; width:100%;
      background:rgba(10,6,6,0.9);
      display:flex; justify-content:space-between;
      padding:12px 20px; z-index:1000;
    }

    .nav-logo { color:var(--wine); text-decoration:none; font-weight:600; }

    .nav-links a {
      color:white; text-decoration:none; margin-left:12px;
      font-size:0.9rem;
    }

    .exhibition-hero {
      height:100vh;
      display:flex; justify-content:center; align-items:center;
      text-align:center;
    }

    .hero-title {
      font-size:4rem;
      font-family:'Cormorant Garamond',serif;
    }

    .gallery { padding:60px 20px; }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:12px;
    }

    .item {
      position:relative;
      overflow:hidden;
    }

    .item img, .item video {
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .empty {
      text-align:center;
      padding:60px;
      color:#aaa;
    }

    footer {
      text-align:center;
      padding:30px;
      color:#777;
    }
  </style>
</head>

<body>

<nav class="nav-bar">
  <a href="home.html" class="nav-logo">Bena Kouture</a>
  <div class="nav-links">
    <a href="home.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="exhibition.html">Exhibition</a>
  </div>
</nav>

<section class="exhibition-hero">
  <h1 class="hero-title">Exhibition</h1>
</section>

<section class="gallery">
  <div id="gallery" class="grid"></div>
</section>

<footer>© Bena Kouture</footer>

<script src="js/app.js"></script>

<script>
  async function loadExhibition() {
    const gallery = document.getElementById('gallery');

    try {
      const media = await fetchApi('/exhibition'); // ✅ FIX: backend fetch

      if (!media || media.length === 0) {
        gallery.innerHTML = `<div class="empty">No exhibition media yet</div>`;
        return;
      }

      gallery.innerHTML = media.map(item => {
        const src = item.src.startsWith('http')
          ? item.src
          : 'https://benakouture.onrender.com' + item.src;

        if (item.type === 'video') {
          return `
            <div class="item">
              <video src="${src}" controls muted loop></video>
            </div>
          `;
        } else {
          return `
            <div class="item">
              <img src="${src}" alt="Exhibition">
            </div>
          `;
        }
      }).join('');

    } catch (err) {
      gallery.innerHTML = `<div class="empty">Failed to load exhibition</div>`;
    }
  }

  loadExhibition();
</script>

</body>
</html>
