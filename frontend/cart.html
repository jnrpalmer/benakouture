<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - Bena Kouture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="nav-bar">
    <a href="home.html" class="nav-logo">Bena Kouture</a>
    <button class="hamburger" id="hamburger">&#9776;</button>
    <div class="nav-links">
      <a href="home.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="#" id="profileLink">Profile</a>
    </div>
    <div class="nav-actions">
      <a href="cart.html" class="icon-btn" title="Cart">🛒</a>
      <button type="button" class="icon-btn" id="logoutBtn" title="Logout">⎋</button>
    </div>
  </nav>

  <main class="main-content">
    <section class="section">
      <h2 class="section-title">Your Cart</h2>
      <div id="cartContent">
        <div class="empty-state" id="emptyCart">
          <p>Your cart is empty.</p>
          <a href="shop.html" class="btn">Continue Shopping</a>
        </div>
        <div id="cartListWrap" style="display: none;">
          <div class="cart-list" id="cartList"></div>
          <div class="cart-summary">
            <p class="total">Total: ₦<span id="cartTotal">0</span></p>
            <a href="checkout.html" class="btn">Proceed to Checkout</a>
          </div>
        </div>
      </div>
    </section>

    <footer class="page-footer">
      &copy; Bena Kouture. Your Queenship is Our Happiness.
    </footer>
  </main>

  <script src="js/app.js"></script>
  <script>
    if (!requireAuth()) throw new Error('redirect');
    setActiveNav();
    document.getElementById('profileLink').href = isAdmin() ? 'admin.html' : '#';
    document.getElementById('profileLink').textContent = isAdmin() ? 'Admin' : 'Profile';
    document.getElementById('logoutBtn').addEventListener('click', () => {
      setToken(null);
      setUser(null);
      window.location.href = 'login.html';
    });

    const API_BASE = 'http://localhost:3000/api';
    function renderCart() {
      const cart = getCart();
      const empty = document.getElementById('emptyCart');
      const wrap = document.getElementById('cartListWrap');
      const list = document.getElementById('cartList');
      const totalEl = document.getElementById('cartTotal');

      if (cart.length === 0) {
        empty.style.display = 'block';
        wrap.style.display = 'none';
        return;
      }
      empty.style.display = 'none';
      wrap.style.display = 'block';
      list.innerHTML = cart.map(item => {
        const imgSrc = item.image ? API_BASE.replace('/api','') + item.image : 'https://via.placeholder.com/80x100/722F37/ffffff?text=Item';
        return `
          <div class="cart-item" data-id="${item.productId}">
            <img src="${imgSrc}" alt="${item.name}">
            <div class="details">
              <div class="name">${item.name}</div>
              <div class="price">₦${Number(item.price).toLocaleString()}</div>
              <div class="qty">Qty: ${item.quantity}</div>
            </div>
            <button type="button" class="btn remove" data-id="${item.productId}">Remove</button>
          </div>
        `;
      }).join('');
      totalEl.textContent = cartTotal().toLocaleString();
      list.querySelectorAll('.remove').forEach(btn => {
        btn.addEventListener('click', () => {
          removeFromCart(btn.dataset.id);
          renderCart();
        });
      });
    }
    renderCart();
  </script>
</body>
</html>
