<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - Bena Kouture</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">

  <style>
    .product-card { position: relative; }
    .product-btn-row { display: flex; gap: 8px; margin-top: 10px; }

    .btn-buy {
      flex: 1;
      padding: 10px;
      background: #722F37;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: none;
      cursor: pointer;
    }

    .out-of-stock-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: black;
      color: white;
      padding: 4px 8px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<nav class="nav-bar">
  <a href="home.html" class="nav-logo">Bena Kouture</a>
</nav>

<main class="main-content">
  <section>
    <h2>Shop All</h2>

    <div id="emptyState"><p>Loading...</p></div>
    <div id="productsGrid" style="display:none;"></div>

  </section>
</main>

<script src="js/app.js"></script>

<script>
if (!requireAuth()) throw new Error("redirect");

async function loadProducts() {
  const grid = document.getElementById("productsGrid");
  const empty = document.getElementById("emptyState");

  try {
    const products = await fetchApi("/products");

    console.log("PRODUCTS:", products); // DEBUG

    if (!products || products.length === 0) {
      empty.innerHTML = "<p>No products found.</p>";
      return;
    }

    empty.style.display = "none";
    grid.style.display = "grid";

    grid.innerHTML = products.map(p => {
      const out = p.stock <= 0;

      return `
        <div class="product-card">
          ${out ? '<div class="out-of-stock-badge">Out</div>' : ""}

          <img src="${p.image ? 'https://benakouture.onrender.com' + p.image : ''}" style="width:100%">

          <h3>${p.name}</h3>
          <p>₵${p.price}</p>

          <div class="product-btn-row">
            <button class="btn-buy" ${out ? "disabled" : ""}
              onclick="buyNow('${p._id}','${p.name}',${p.price},'${p.image || ""}')">
              Buy
            </button>

            <button class="btn-icon" ${out ? "disabled" : ""}
              onclick="addCart('${p._id}','${p.name}',${p.price},'${p.image || ""}')">
              🛒
            </button>
          </div>
        </div>
      `;
    }).join("");

  } catch (err) {
    console.error(err);
    empty.innerHTML = "<p>Failed to load products</p>";
  }
}

function buyNow(id,name,price,image){
  addToCart({_id:id,name,price,image});
  window.location.href = "checkout.html";
}

function addCart(id,name,price,image){
  addToCart({_id:id,name,price,image});
}

loadProducts();
</script>

</body>
</html>
