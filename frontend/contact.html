<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Bena Kouture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="nav-bar">
    <a href="home.html" class="nav-logo">Bena Kouture</a>
    <button class="hamburger" id="hamburger">&#9776;</button>
    <div class="nav-links">
      <a href="home.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="#" id="profileLink">Profile</a>
    </div>
    <div class="nav-actions">
      <a href="cart.html" class="icon-btn" title="Cart">🛒</a>
      <button type="button" class="icon-btn" id="logoutBtn" title="Logout">⎋</button>
    </div>
  </nav>

  <main class="main-content">
    <section class="section">
      <h2 class="section-title">Contact Us</h2>
      <div class="form-page">
        <form id="contactForm">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required placeholder="Your name">
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="you@example.com">
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" required placeholder="How can we help?"></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Send Message</button>
        </form>
        <p id="contactSuccess" style="display:none; text-align:center; color: var(--wine); margin-top: 16px;">Thank you. We will get back to you soon.</p>
      </div>
    </section>

    <footer class="page-footer">
      &copy; Bena Kouture. Your Queenship is Our Happiness.
    </footer>
  </main>

  <script src="js/app.js"></script>
  <script>
    if (!requireAuth()) throw new Error('redirect');
    setActiveNav();
    document.getElementById('profileLink').href = isAdmin() ? 'admin.html' : '#';
    document.getElementById('profileLink').textContent = isAdmin() ? 'Admin' : 'Profile';
    document.getElementById('logoutBtn').addEventListener('click', () => {
      setToken(null);
      setUser(null);
      window.location.href = 'login.html';
    });
    document.getElementById('contactForm').addEventListener('submit', (e) => {
      e.preventDefault();
      document.getElementById('contactSuccess').style.display = 'block';
      e.target.reset();
    });
  </script>
</body>
</html>
