<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Bena Kouture</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
  <script src="https://js.paystack.co/v1/inline.js"></script>

  <style>
    .delivery-options { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .delivery-option {
      flex: 1; min-width: 140px; padding: 16px;
      border: 2px solid #ede0e0; border-radius: 10px;
      cursor: pointer; text-align: center;
      background: #fafafa;
    }
    .delivery-option.selected {
      border-color: #722F37;
      background: rgba(114,47,55,0.06);
    }
    .order-summary {
      background: #fafafa;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .order-summary-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 0.88rem;
    }
    .order-summary-row.total {
      font-weight: 600;
      border-top: 1px solid #ede0e0;
      margin-top: 8px;
      padding-top: 12px;
    }
    .pay-btn {
      width: 100%;
      padding: 16px;
      background: #722F37;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<nav class="nav-bar">
  <a href="home.html" class="nav-logo">Bena Kouture</a>
  <button class="hamburger" id="hamburger">&#9776;</button>
  <div class="nav-links">
    <a href="home.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="cart.html">Cart</a>
    <a href="#" id="logoutBtn">Logout</a>
  </div>
</nav>

<main class="main-content">

<section class="section">
  <h2>Checkout</h2>

  <div id="orderSummary" class="order-summary"></div>

  <form id="checkoutForm">

    <input type="text" id="customerName" placeholder="Full Name" required>
    <input type="email" id="customerEmail" placeholder="Email" required>
    <input type="tel" id="phone" placeholder="Phone Number" required>

    <div class="delivery-options">
      <div class="delivery-option selected" onclick="selectDelivery('pickup')" id="opt-pickup">
        Pickup (Free)
      </div>
      <div class="delivery-option" onclick="selectDelivery('delivery')" id="opt-delivery">
        Delivery (<span id="deliveryFeeDisplay">0</span>)
      </div>
    </div>

    <textarea id="deliveryAddress" placeholder="Delivery Address" style="display:none;"></textarea>

    <button type="submit" class="pay-btn" id="payBtn">Pay with Paystack</button>

    <p id="checkoutError" style="color:red; display:none;"></p>

  </form>
</section>

<div id="confirmationWrap" style="display:none;text-align:center;">
  <h2>Order Confirmed</h2>
  <p id="confirmOrderId"></p>
</div>

</main>

<script src="js/app.js"></script>

<script>
let deliveryMethod = "pickup";
let deliveryFee = 0;

function selectDelivery(method) {
  deliveryMethod = method;

  document.getElementById("opt-pickup").classList.toggle("selected", method === "pickup");
  document.getElementById("opt-delivery").classList.toggle("selected", method === "delivery");

  document.getElementById("deliveryAddress").style.display =
    method === "delivery" ? "block" : "none";

  deliveryFee = method === "delivery" ? 20 : 0;

  updateSummary();
}

function updateSummary() {
  const cart = getCart();
  const subtotal = cartTotal();
  const total = subtotal + deliveryFee;

  document.getElementById("orderSummary").innerHTML = `
    ${cart.map(i => `
      <div class="order-summary-row">
        <span>${i.name} x${i.quantity}</span>
        <span>₵${(i.price * i.quantity).toLocaleString()}</span>
      </div>
    `).join("")}

    <div class="order-summary-row">
      <span>Subtotal</span>
      <span>₵${subtotal}</span>
    </div>

    <div class="order-summary-row">
      <span>Delivery</span>
      <span>${deliveryFee === 0 ? "Free" : "₵" + deliveryFee}</span>
    </div>

    <div class="order-summary-row total">
      <span>Total</span>
      <span>₵${total}</span>
    </div>
  `;
}

document.getElementById("checkoutForm").addEventListener("submit", function(e){
  e.preventDefault();

  const email = document.getElementById("customerEmail").value;
  const total = cartTotal() + deliveryFee;

  const handler = PaystackPop.setup({
    key: "pk_test_xxxxxxxxx",
    email: email,
    amount: total * 100,
    currency: "GHS",
    ref: "BK_" + Date.now(),

    callback: function(response){
      setCart([]);
      document.getElementById("confirmationWrap").style.display = "block";
      document.getElementById("checkoutForm").style.display = "none";
      document.getElementById("confirmOrderId").textContent = response.reference;
    }
  });

  handler.openIframe();
});

updateSummary();
</script>

</body>
</html>
