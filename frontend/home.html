<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bena Kouture - Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="nav-bar">
    <a href="home.html" class="nav-logo">Bena Kouture</a>
    <button class="hamburger" id="hamburger">&#9776;</button>
    <div class="nav-links">
      <a href="home.html" class="active">Home</a>
      <a href="shop.html">Shop</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="exhibition.html">Exhibition</a>
      <a href="join-us.html">Join Us</a>
      <a href="profile.html">Profile</a>
      <a href="cart.html">🛒 Cart</a>
      <a href="#" id="logoutBtn">Logout</a>
    </div>
  </nav>

  <main class="main-content">
    <section class="hero">
      <h1>Bena Kouture</h1>
      <p class="tagline">Your Queenship is Our Happiness</p>
      <a href="shop.html" class="btn">Shop Collection</a>
    </section>

    <section class="section">
      <h2 class="section-title">Featured</h2>
      <div id="productSection">
        <div class="empty-state" id="emptyState">
          <p>No products yet.</p>
        </div>
        <div class="products-grid" id="productsGrid" style="display:none;"></div>
      </div>
    </section>

    <footer class="page-footer">
      &copy; Bena Kouture. Your Queenship is Our Happiness.
    </footer>
  </main>

  <script src="js/app.js"></script>
  <script>
    if (localStorage.getItem('bena_dark') === 'true') document.body.classList.add('dark-mode');
    if (!requireAuth()) throw new Error('redirect');
    setActiveNav();

    async function loadFeatured() {
      try {
        const products = await fetchApi('/products');
        const featured = products.filter(p => p.featured === true);
        const display = featured.length > 0 ? featured : products.slice(0, 4);
        const grid = document.getElementById('productsGrid');
        const empty = document.getElementById('emptyState');
        if (display.length === 0) {
          grid.style.display = 'none';
          empty.style.display = 'block';
          return;
        }
        empty.style.display = 'none';
        grid.style.display = 'grid';
        grid.innerHTML = display.map(p => `
          <article class="product-card slide-up">
            <div class="img-wrap">
              <img src="${p.image ? 'https://benakouture.onrender.com' + p.image : 'https://via.placeholder.com/300x400/722F37/ffffff?text=Bena+Kouture'}" alt="${p.name}">
            </div>
            <div class="info">
              <div class="name">${p.name}</div>
              <div class="desc">${p.description || ''}</div>
              <div class="price">₵${Number(p.price).toLocaleString()}</div>
              <button type="button" class="btn add-cart" data-id="${p._id}" data-name="${p.name}" data-price="${p.price}" data-image="${p.image || ''}">Add to Cart</button>
            </div>
          </article>
        `).join('');
        grid.querySelectorAll('.add-cart').forEach(btn => {
          btn.addEventListener('click', () => {
            addToCart({ _id: btn.dataset.id, name: btn.dataset.name, price: Number(btn.dataset.price), image: btn.dataset.image || '' });
            alert('Added to cart!');
          });
        });
      } catch (e) {
        const empty = document.getElementById('emptyState');
        if (empty) empty.innerHTML = '<p>Unable to load products.</p>';
      }
    }
    loadFeatured();
  </script>
</body>
</html>
